name: Build Cross-Platform Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            executable: WaterCoolerManager
            requirements_extra: requirements-linux.txt
            system_deps: |
              sudo apt update
              sudo apt install -y \
                python3-gi \
                python3-gi-cairo \
                gir1.2-gtk-3.0 \
                gir1.2-appindicator3-0.1 \
                libgtk-3-dev \
                libcairo2-dev \
                libgirepository1.0-dev \
                pkg-config
            pyinstaller_separator: ":"
          - os: windows-latest
            platform: windows
            executable: WaterCoolerManager.exe
            requirements_extra: requirements-windows.txt
            system_deps: ""
            pyinstaller_separator: ";"
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install system dependencies (Linux)
      if: matrix.platform == 'linux'
      run: ${{ matrix.system_deps }}
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        if [ -f "${{ matrix.requirements_extra }}" ]; then pip install -r ${{ matrix.requirements_extra }}; fi
        pip install pyinstaller
      shell: bash
        
    - name: Build executable
      run: |        
        pyinstaller --noconfirm --onefile --windowed --noconsole --icon "src/icons/connected.png" --add-data "src/icons${{ matrix.pyinstaller_separator }}icons" --add-data "src/watercooler_manager${{ matrix.pyinstaller_separator }}watercooler_manager" --name "WaterCoolerManager" src/main.py
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.platform }}-executable
        path: dist/${{ matrix.executable }}
        
  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Download Linux artifact
      uses: actions/download-artifact@v3
      with:
        name: linux-executable
        path: ./linux/
        
    - name: Download Windows artifact
      uses: actions/download-artifact@v3
      with:
        name: windows-executable
        path: ./windows/
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          linux/WaterCoolerManager
          windows/WaterCoolerManager.exe
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
